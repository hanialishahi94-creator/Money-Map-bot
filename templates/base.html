<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پنل ادمین مانی‌مپ{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f3f4fb;
            --sidebar: #15152b;
            --sidebar-2: #1e1e3f;
            --accent: #7c5cff;
            --accent-2: #22d3c5;
            --card: #ffffff;
            --text: #1d1d2b;
            --muted: #8a8aa3;
            --border: #ececf5;
            --sidebar-width: 250px;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            font-family: "Vazirmatn", Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        a { text-decoration: none; }

        /* ===== سایدبار سمت راست ===== */
        .sidebar {
            position: fixed;
            top: 0; right: 0; bottom: 0;
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--sidebar) 0%, var(--sidebar-2) 100%);
            display: flex;
            flex-direction: column;
            padding: 28px 18px;
            z-index: 50;
        }
        .sidebar .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .sidebar .brand img { width: 64px; height: 64px; border-radius: 50%; }
        .sidebar .brand .name {
            color: #fff;
            font-weight: 800;
            font-size: 17px;
            letter-spacing: .3px;
        }
        .sidebar .brand .sub {
            color: var(--accent-2);
            font-size: 11px;
            font-weight: 500;
        }
        .nav { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
        .nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #c9c9e6;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: all .15s ease;
        }
        .nav a .ic { font-size: 16px; }
        .nav a:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .nav a.active {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #fff;
            box-shadow: 0 4px 14px rgba(124,92,255,0.35);
        }
        .nav .logout {
            margin-top: auto;
            color: #ff8585;
        }
        .nav .logout:hover { background: rgba(255,90,90,0.12); color: #ff8585; }

        /* ===== محتوای اصلی ===== */
        .main-wrap { margin-right: var(--sidebar-width); min-height: 100vh; }
        .topbar-mobile { display: none; }
        .container { max-width: 1040px; margin: 0 auto; padding: 32px 28px; }

        .page-title { font-size: 22px; font-weight: 800; margin: 0 0 22px; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 26px;
            margin-bottom: 22px;
            box-shadow: 0 2px 10px rgba(20,20,50,0.04);
        }
        .card h3 { margin-top: 0; font-size: 16px; font-weight: 700; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 12px 10px; text-align: right; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: .3px; }
        tr:hover td { background: #fafaff; }

        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; display: inline-block; }
        .badge-green { background: #e3faf0; color: #18a566; }
        .badge-red { background: #ffeaea; color: #e0453f; }
        .badge-gray { background: #f0f0f7; color: #8a8aa3; }

        .stat-grid { display: flex; gap: 18px; flex-wrap: wrap; margin-bottom: 4px; }
        .stat-box {
            flex: 1; min-width: 180px; background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px; text-align: center;
            box-shadow: 0 2px 10px rgba(20,20,50,0.04);
            position: relative; overflow: hidden;
        }
        .stat-box::before {
            content: ""; position: absolute; inset: 0 auto auto 0; width: 5px; height: 100%;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
        }
        .stat-box .num { font-size: 30px; font-weight: 800; color: var(--text); }
        .stat-box .label { font-size: 13px; color: var(--muted); margin-top: 6px; }

        textarea, input[type=text], input[type=password] {
            width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px;
            font-family: inherit; font-size: 14px; background: #fbfbfe; transition: border-color .15s;
        }
        textarea:focus, input:focus { outline: none; border-color: var(--accent); background: #fff; }
        textarea { min-height: 200px; resize: vertical; }
        label { font-weight: 600; font-size: 13px; display: block; margin: 12px 0 6px; color: var(--text); }

        button, .btn {
            background: linear-gradient(90deg, var(--accent), var(--accent-2));
            color: #fff; border: none; padding: 11px 24px;
            border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px;
            font-family: inherit;
            transition: transform .12s, box-shadow .12s;
        }
        button:hover, .btn:hover { box-shadow: 0 6px 16px rgba(124,92,255,0.35); transform: translateY(-1px); }

        .flash {
            background: #fff7e0; border: 1px solid #f3d97a; color: #8a6d1f;
            padding: 12px 16px; border-radius: 10px; margin-bottom: 18px; font-size: 14px; font-weight: 500;
        }
        .asset-tabs { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
        .asset-tabs a {
            padding: 9px 18px; border-radius: 10px; background: #f0f0f7; color: var(--text);
            font-size: 14px; font-weight: 600;
        }
        .asset-tabs a.active { background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #fff; }
        .muted { color: var(--muted); font-size: 12px; }

        @media (max-width: 880px) {
            .sidebar { display: none; }
            .main-wrap { margin-right: 0; }
            .topbar-mobile {
                display: flex; justify-content: space-between; align-items: center;
                background: var(--sidebar); padding: 14px 18px;
            }
            .topbar-mobile .brand { display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 800; }
            .topbar-mobile .brand img { width: 28px; height: 28px; border-radius: 50%; }
            .topbar-mobile select { padding: 6px 10px; border-radius: 8px; border: none; font-family: inherit; }
        }
    </style>
</head>
<body>
    {% if session.get('logged_in') %}
    <div class="sidebar">
        <div class="brand">
            <img src="{{ url_for('static', filename='logo.svg') }}" alt="Money Map">
            <div class="name">مانی‌مپ</div>
            <div class="sub">پنل مدیریت</div>
        </div>
        <nav class="nav">
            <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' else '' }}"><span class="ic">📊</span> داشبورد</a>
            <a href="{{ url_for('users_list') }}" class="{{ 'active' if request.endpoint == 'users_list' else '' }}"><span class="ic">👥</span> کاربران</a>
            <a href="{{ url_for('vip_list_view') }}" class="{{ 'active' if request.endpoint == 'vip_list_view' else '' }}"><span class="ic">💎</span> اشتراک VIP</a>
            <a href="{{ url_for('analysis') }}" class="{{ 'active' if request.endpoint == 'analysis' else '' }}"><span class="ic">📈</span> تحلیل هفتگی</a>
            <a href="{{ url_for('logout') }}" class="logout"><span class="ic">🚪</span> خروج</a>
        </nav>
    </div>
    <div class="topbar-mobile">
        <div class="brand"><img src="{{ url_for('static', filename='logo.svg') }}" alt="logo"> مانی‌مپ</div>
        <select onchange="if(this.value) window.location.href=this.value">
            <option value="">منو</option>
            <option value="{{ url_for('dashboard') }}">داشبورد</option>
            <option value="{{ url_for('users_list') }}">کاربران</option>
            <option value="{{ url_for('vip_list_view') }}">اشتراک VIP</option>
            <option value="{{ url_for('analysis') }}">تحلیل هفتگی</option>
            <option value="{{ url_for('logout') }}">خروج</option>
        </select>
    </div>
    {% endif %}
    <div class="main-wrap">
        <div class="container">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for m in messages %}
                        <div class="flash">{{ m }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
