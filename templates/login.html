{% extends "base.html" %}
{% block title %}ورود به پنل ادمین{% endblock %}
{% block content %}
<style>
    .login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at 30% 20%, #2a2a55 0%, #15152b 55%, #0e0e1f 100%);
        margin: -32px -28px;
        padding: 32px 28px;
    }
    .login-card {
        width: 100%;
        max-width: 380px;
        background: #ffffff;
        border-radius: 20px;
        padding: 36px 32px 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.35);
        text-align: center;
    }
    .login-card img { width: 78px; height: 78px; border-radius: 50%; margin-bottom: 10px; }
    .login-card h2 { margin: 4px 0 4px; font-size: 19px; font-weight: 800; }
    .login-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
    .login-card form { text-align: right; }
    .pass-wrap { position: relative; }
    .pass-wrap input { padding-left: 46px; }
    .toggle-eye {
        position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
        background: none; border: none; cursor: pointer; padding: 0; margin: 0;
        font-size: 16px; color: var(--muted); box-shadow: none;
    }
    .toggle-eye:hover { color: var(--accent); box-shadow: none; transform: translateY(-50%); }
    .login-card button[type=submit] { width: 100%; padding: 13px; font-size: 15px; }
</style>
<div class="login-screen">
    <div class="login-card">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="Money Map">
        <h2>ورود به پنل ادمین مانی‌مپ</h2>
        <div class="sub">برای مدیریت بات وارد شو</div>
        <form method="post">
            <label>نام کاربری</label>
            <input type="text" name="username" required autofocus>
            <label>رمز عبور</label>
            <div class="pass-wrap">
                <input type="password" name="password" id="pwd" required>
                <button type="button" class="toggle-eye" onclick="togglePwd()" id="eyeBtn" aria-label="نمایش رمز">👁️</button>
            </div>
            <button type="submit">ورود</button>
        </form>
    </div>
</div>
<script>
function togglePwd() {
    const pwd = document.getElementById('pwd');
    const eye = document.getElementById('eyeBtn');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        eye.textContent = '🙈';
    } else {
        pwd.type = 'password';
        eye.textContent = '👁️';
    }
}
</script>
{% endblock %}
